<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spendly Ledger Overview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="max-width:650px; margin:0 auto; padding:20px;">
        <h1>Spendly Dashboard</h1>
        <div style="background:#2c3e50; color:#fff; padding:20px; text-align:center; border-radius:6px;">
            <h3>Total Expenses Summary</h3>
            <div style="font-size:24pt; font-weight:bold;">${{ "%.2f"|format(total) }}</div>
        </div>
        <form action="/add" method="POST" style="background:#fff; padding:20px; border:1px solid #ddd; margin-top:20px; border-radius:6px;">
            <input type="text" name="title" placeholder="Description" required style="width:100%; margin-bottom:10px; padding:8px;"><br>
            <input type="number" step="0.01" name="amount" placeholder="Amount" required style="width:100%; margin-bottom:10px; padding:8px;"><br>
            <select name="category" required style="width:100%; margin-bottom:15px; padding:8px;">
                <option value="Food">Food</option>
                <option value="Utilities">Utilities</option>
                <option value="Transport">Transport</option>
            </select>
            <button type="submit" style="width:100%; padding:10px; background:#3182ce; color:#fff; border:none; font-weight:bold;">Add Record</button>
        </form>
        <table style="width:100%; margin-top:20px; border-collapse:collapse;">
            <thead>
                <tr style="background:#eee;">
                    <th>Item</th><th>Category</th><th>Cost</th><th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for item in expenses %}
                <tr>
                    <td>{{ item['title'] }}</td>
                    <td>{{ item['category'] }}</td>
                    <td>${{ "%.2f"|format(item['amount']) }}</td>
                    <td><a href="/delete/{{ item['id'] }}" style="color:red;">Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
